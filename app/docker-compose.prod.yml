version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: taskflow-postgres-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./database/init-complete.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      timeout: 20s
      retries: 10
      interval: 30s

  redis:
    image: redis:7-alpine
    container_name: taskflow-redis-prod
    volumes:
      - redis_prod_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - taskflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5
      interval: 30s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: taskflow-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}
      FRONTEND_URL: ${FRONTEND_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}
      UPLOAD_PATH: ${UPLOAD_PATH}
      SESSION_SECRET: ${SESSION_SECRET}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: ${LOG_FILE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    networks:
      - taskflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      timeout: 10s
      retries: 3
      start_period: 60s
      interval: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: taskflow-frontend-prod
    environment:
      VITE_API_URL: ${FRONTEND_URL}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskflow-network
    ports:
      - "3000:3000"
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      timeout: 10s
      retries: 3
      start_period: 30s
      interval: 30s

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  taskflow-network:
    driver: bridge